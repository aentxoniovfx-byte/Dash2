<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Analytics Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

:root{
    --bg:#050a18;
    --text:#eef4ff;
}

body{
    background:
    radial-gradient(circle at 20% 25%, rgba(99,102,241,.18), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(167,243,208,.10), transparent 55%),
    var(--bg);

    color:var(--text);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    font-size:2rem;
    margin-bottom:25px;
}

.toolbar{
    display:flex;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    border-radius:14px;
    transition:.2s ease;
}

.primary-btn{
    background:linear-gradient(135deg,
        rgba(99,102,241,.25),
        rgba(129,140,248,.18)
    );
    color:white;
    padding:12px 16px;
    font-weight:600;
}

.total-card{
    margin-bottom:20px;
    padding:16px 20px;
    border-radius:18px;
    border:1px solid rgba(167,243,208,.35);
    background:rgba(167,243,208,.08);
    display:flex;
    justify-content:space-between;
}

.total-value{
    font-size:1.6rem;
    font-weight:700;
    color:rgba(167,243,208,.95);
}

.categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.category-card{
    padding:20px;
    border-radius:24px;
    border:1px solid rgba(255,255,255,.10);
}

.category-name{
    font-size:1.1rem;
    font-weight:600;
}

.category-count{
    font-size:2rem;
    font-weight:700;
    margin:12px 0;
}

.bar{
    height:6px;
    width:100%;
    background:rgba(255,255,255,.06);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:12px;
}

.bar-fill{
    height:100%;
    border-radius:20px;
}

.actions{
    display:flex;
    gap:8px;
}

.icon-btn{
    flex:1;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    color:white;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.10);
}

.add{ background:rgba(99,102,241,.20); }
.sub{ background:rgba(56,189,248,.15); }
</style>
</head>

<body>

<div class="container">

<h1>📞 Call Analytics Dashboard</h1>

<div class="toolbar">
    <button class="primary-btn" onclick="exportCSV()">📊 Export CSV</button>
    <button class="primary-btn" onclick="clearAll()">🧹 Clear All</button>
</div>

<div class="total-card">
    <div>Total Calls</div>
    <div class="total-value" id="totalValue">0</div>
</div>

<div class="categories" id="categories"></div>

</div>

<script>

/* =========================
   CATEGORÍAS FIJAS
========================= */
let data = {
    categories: [
        {name:"Complains", count:0},
        {name:"Cancelations/Books off", count:0},
        {name:"NSNF", count:0},
        {name:"Schedule", count:0},
        {name:"OHAH", count:0},
        {name:"Reschedule", count:0},
        {name:"Other", count:0},
        {name:"Vacant visits", count:0},
        {name:"Staff Late/No show up", count:0}
    ]
};

/* =========================
   PERSISTENCIA
========================= */
function save(){
    localStorage.setItem("callDashboardFixed", JSON.stringify(data));
}

function load(){
    const saved = JSON.parse(localStorage.getItem("callDashboardFixed"));

    if(saved){
        data.categories.forEach((cat,i)=>{
            if(saved.categories?.[i]){
                cat.count = saved.categories[i].count || 0;
            }
        });
    }
}

/* =========================
   COLORES DINÁMICOS
========================= */
function getColor(count){

    let r,g,b;

    if(count <= 5){
        let t = count/5;
        r = 99 + (120-99)*t;
        g = 102 + (180-102)*t;
        b = 241;
    }
    else if(count <= 15){
        let t = (count-5)/10;
        r = 120 + (56-120)*t;
        g = 180 + (189-180)*t;
        b = 241;
    }
    else{
        let t = Math.min((count-15)/15,1);
        r = 56 + (239-56)*t;
        g = 189 + (68-189)*t;
        b = 241 - (241-200)*t;
    }

    return `rgba(${r},${g},${b},.75)`;
}

/* =========================
   RENDER
========================= */
function render(){

    const container = document.getElementById("categories");
    container.innerHTML = "";

    let total = data.categories.reduce((s,c)=>s+c.count,0);
    document.getElementById("totalValue").textContent = total;

    let max = Math.max(...data.categories.map(c=>c.count),1);

    data.categories.forEach((cat,i)=>{

        let color = getColor(cat.count);
        let percent = (cat.count/max)*100;

        container.innerHTML += `
        <div class="category-card" style="border-color:${color}">

            <div class="category-name">${cat.name}</div>

            <div class="category-count" style="color:${color}">
                ${cat.count}
            </div>

            <div class="bar">
                <div class="bar-fill"
                    style="width:${percent}%; background:${color}">
                </div>
            </div>

            <div class="actions">
                <button class="icon-btn add" onclick="addCall(${i})">+</button>
                <button class="icon-btn sub" onclick="subCall(${i})">−</button>
            </div>

        </div>`;
    });
}

/* =========================
   ACCIONES
========================= */
function addCall(i){
    data.categories[i].count++;
    save();
    render();
}

function subCall(i){
    if(data.categories[i].count > 0){
        data.categories[i].count--;
        save();
        render();
    }
}

function clearAll(){
    if(!confirm("Clear ALL calls?")) return;
    data.categories.forEach(c=>c.count=0);
    save();
    render();
}

/* =========================
   EXPORT CSV
========================= */
function exportCSV(){
    let csv = "Category,Calls\n";

    data.categories.forEach(c=>{
        csv += `"${c.name}",${c.count}\n`;
    });

    const blob = new Blob([csv],{type:"text/csv"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "call-report.csv";
    a.click();

    URL.revokeObjectURL(url);
}

/* =========================
   INIT
========================= */
load();
render();

</script>

</body>
</html>
